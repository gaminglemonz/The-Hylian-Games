// Pixel art function
function createPixels(bitmap, palette, pixelSize, x=0, y=0){
    for (let i = 0; i < bitmap.length; i ++){
        for (let j = 0; j < bitmap[i].length; j ++){
            if (bitmap[i][j] !== ' '){
            	pushMatrix();
            	translate(x, y)
                fill(palette[bitmap[i][j]]);
                rect(Math.floor(j * pixelSize), Math.floor(i * pixelSize), pixelSize, pixelSize);
                popMatrix();
            }
        }
    }
}

const Funcs = (function(){
	const _Funcs = {
		dist: (a, b) => Math.sqrt(Math.pow((b.x - a.x), 2) + Math.pow((b.y - a.y), 2)),
		radToDeg: (angle) => angle * (180 / Math.PI),
		degToRad: (angle) => angle * (Math.PI / 180),
		lerp: (a, b, t) => a + (b - a) * t,
		weightedRandomness: (items, weights) => {
			const arr = [];
			items.forEach((item, index) => {
				for (let i = 0; i < weights[index]; i ++){
					arr.push(item);
				}
			})
			
			return arr;
		},
		onCanvas: (obj, cam) => { 
			const sz = (obj.r ? obj.r : Math.max(obj.w, obj.h)) + 60; 
			return obj.x + sz > cam.x - width / (2*cam.zoom) && obj.x < cam.x + width / (2*cam.zoom) + sz&&
				   obj.y + sz > cam.y - height / (2*cam.zoom) && obj.y < cam.y + height / (2*cam.zoom) + sz 
		},
	};
	return _Funcs;
})();

class Keys {

        	'interact': ['KeyE'],
        	'reset': ['KeyR'],
        	'sprint': ['ShiftLeft'],
        	'enter': ['Enter'],
        	'inventory': ['KeyI'],
        };
        for (let i = 0; i < 9; i ++){
        	this.keys[i + 1] = [`Digit${i + 1}`];
        }
        
        this.pressed = {};
        this.released = {};
        this.clicked = {};
        
        document.addEventListener('keyup', (e) => {
            delete this.pressed[e.code];
            this.released[e.code] = true;
        });
        document.addEventListener('keydown', (e) => {
            this.pressed[e.code] = true;
            this.clicked[e.code] = true;
            
        });
    }
    update(){
        for (let k in this.clicked) delete this.clicked[k];
        for (let k in this.released) delete this.released[k];
    }
    keyByValue(obj, v){
        return Object.keys(obj).find(k => obj[k].includes(v));
    }
    getAction(action, key){
        for (let k in this.keys){
                for (let v = 0; v < this.keys[k].length; v ++){
                const value = this.keys[k][v];
                if (value in action){
                    const act = this.keyByValue(this.keys, value);
                    if (act === key) return true;
                }
            }
        }
        return false;
    }
    press(key){
        return this.getAction(this.pressed, key);
    }
    release(key){
        return this.getAction(this.released, key);
    }
    click(key){
        return this.getAction(this.clicked, key);
    }
}

class Mouse {
    constructor(config){
        this.x = mouseX;
        this.y = mouseY;
        
        this.clicked = false;
        this.released = false;
        this.pressed = false;
        
        this.cam = config.cam;
        
        document.addEventListener('mouseup', () => {
            this.released = true;
            this.clicked = false;
            this.pressed = false;
        });
        document.addEventListener('mousedown', () => {
            this.released = false;
            this.clicked = true;
            this.pressed = true;
        });
    }
    update(){
        this.x = mouseX;
        this.y = mouseY;
        this.clicked = false;
        this.released = false;
    }
    intersects(shape, obj){
        if (shape === 'rect'){
            return this.x > obj.x && this.x < obj.x + obj.w &&
                   this.y > obj.y && this.y < obj.y + obj.h;
        } else if (shape === 'circle') {
            const r = obj.sz ? obj.sz / 2 : Math.max(obj.w, obj.h) / 2;
            return Funcs.dist(this, obj) <= r;
        }
        return;
    }
}

class Particle {
	constructor(config){
		this.executable = 'run'
		
		// Position, sizing, and rotation
		this.x = config.x;
		this.y = config.y;
		this.sz = config.sz;
		this.angle = config.angle ?? 0;
		
		// Velocity
		this.v = config.v;
		
		// Animation controllers
		this.expandDir = config.expand ?? 0; // >0 for expanding, <0 for contracting
		this.fade = config.fade;
		
		// Particle lifetime
		this.maxLifetime = config.lifetime ?? 180;
		this.lifetime = config.lifetime ?? 180;
		
		// Image
		this.img = config.img;
	}
	display(){
		imageMode(CENTER)
		
		pushMatrix()
		translate(this.x, this.y)
		rotate(this.angle)
		
		if (this.fade) tint(255, 255, 255, map(this.lifetime, 0, this.maxLifetime, 0, 255));
		
		image(this.img, 0, 0, this.sz, this.sz)
		
		popMatrix();
		
		noTint();
	}
	update(){
		this.sz += this.expandDir;
		this.x += this.v.x;
		this.y += this.v.y;
		
		if (this.lifetime <= 0) this.dead = true
		this.lifetime --;
	}
	run(){
		this.display()
		this.update()
	}
}

// PHYSICS OBJECTS \\
class PhysicsObj {
	constructor(config){
		this.x = config.x;
		this.y = config.y;
		
		if (config.circle){
			this.r = config.r
			this.body = config.body ?? Bodies.circle(this.x, this.y, this.r/2, {
				object: this,
				isStatic: config.static || false,
			})
		} else {
			this.w = config.w;
			this.h = config.h;
			this.radius = config.radius || 0;
			this.body = config.body ?? Bodies.rectangle(this.x, this.y, this.w, this.h, {
				object: this,
				isStatic: config.static || false,
				chamfer: { radius: this.radius }
			})
		}
		
		Composite.add(engine.world, this.body)
	}
	updatePos(){
		this.x = this.body.position.x;
		this.y = this.body.position.y;
		this.angle = this.body.angle;
	}
	updateBody(){
		if (typeof this.offset === 'object'){
			Body.setPosition(this.body, {
				x: this.x + Math.cos(this.angle) * this.offset.x - this.offset.y * Math.sin(this.angle),
				y: this.y + this.offset.x * Math.sin(this.angle) + this.offset.y * Math.cos(this.angle)
			})
		} else {
			this.body.position.x = this.x;
			this.body.position.y = this.y;
		}
		this.body.angle = this.angle
	}
	move(x, y){
		Body.setVelocity(this.body, { x: x, y: y })
	}
}

class Shake {
	constructor(game, config){
		this.intensity = config.intensity;
		this.timer = config.timer;
		
		this.game = game;
	}
	apply(){
		if (this.timer > 0){
			this.game.camera.x += Math.random() * (this.intensity + this.intensity + 1) - this.intensity;
			this.game.camera.y += Math.random() * (this.intensity + this.intensity + 1) - this.intensity;
			if (round(this.timer) % 120 === 0){
				this.game.player.takeDamage(this.intensity)
			}
		}
		this.timer --;
	}
}

class Entity extends PhysicsObj {
	constructor(game, config){
		config.collides = true;
		config.circle = true;
		config.r = config.r ?? ENTITY_SIZE;
		super(config)
		
		// Positions, sizing, and rotation
		this.x = config.x;
		this.y = config.y;
		this.r = config.r;
		this.angle = 0;
		
		this.game = game;
	}
	handleAttacks(weapon, condition){
		const angle = weapon.owner.angle;
		if (condition){
			weapon.hit = false;
			weapon.timer = 60
		}
		if (this === this.game.player){
			if (mouse.released && weapon.timer <= 20){
				weapon.hit = false;
				weapon.timer = 60;
			}
		}
		if (weapon.timer > 0){
			switch (weapon.type){
				case 'sword':
					if (weapon.timer < 60 && weapon.timer > 30) {
						weapon.angle = Funcs.lerp(weapon.angle, angle + Funcs.degToRad(55), 0.1);
					}
						
					if (weapon.timer < 30) {
						weapon.angle = Funcs.lerp(weapon.angle, angle - Funcs.degToRad(85), 0.2);
					}
				break;
				case 'spear':
					if (weapon.timer < 60 && weapon.timer > 30) {
						weapon.offset.x = Funcs.lerp(weapon.offset.x, 20, 0.1)
					}
					if (weapon.timer < 30) {
						weapon.offset.x = Funcs.lerp(weapon.offset.x, 180, 0.1)
					}
				break;
				case 'axe':
					if (weapon.timer < 60 && weapon.timer > 30) {
						weapon.angle = Funcs.lerp(weapon.angle, angle + Funcs.degToRad(90), 0.4);
					}
					if (weapon.timer < 30) {
							weapon.angle = Funcs.lerp(weapon.angle, angle - Funcs.degToRad(-95), 0.6);
					}
				break;
			}
		}
		
	}
}

class Weapon extends PhysicsObj {
	constructor(game, config){

		this.y = config.y;
		this.r = config.r;
		this.angle = 0;
		this.offset = { x: 90, y: 0 }
		
		// Weapon type
		this.type = config.type;
		this.material = config.material;
		
		// Map weapon damage for swords and axes based on material
		this.damageMap = {
			spear: {
				"wooden" : 1,
				"stone" : 2,
				"iron" : 4,
			},
			sword: {
				"wooden" : 2,
				"stone" : 3,
				"iron" : 5,
			},
			axe: {
				"wooden" : 3,
				"stone" : 4,
				"iron" : 6,
			},
		};
		this.durabilityMap = {
			spear: {
				"wooden" : 7,
				"stone" : 8,
				"iron" : 15,
			},
			sword: {
				"wooden" : 7,
				"stone" : 10,
				"iron" : 20,
			},
			axe: {
				"wooden" : 10,
				"stone" : 12,
				"iron" : 22,
			},
		};
		this.durability = this.durabilityMap[this.type][this.material];
		
		// Attack controllers
		this.timer = 0
		this.hit = false;
		
		// Target entity
		this.target = null;
		
		// Visibility (if in inventory)
		this.inInventory = false;
	}
	display(){
		pushMatrix()
		translate(this.x, this.y)
		rotate(Funcs.radToDeg(this.angle))
		// fill(0, 0, 255)
		// ellipse(this.offset.x, this.offset.y, this.r, this.r)
		
		const img = imgs.weapons[`${this.material}_${this.type}`];
		if (!this.inInventory) image(img, this.offset.x, this.offset.y, 120, img.height * (120/img.width))
		
		if (this.owned){
			if (this.owner === this.game.player){
				this.inInventory = this.game.player.weapon !== this;
			}
		}
		
		popMatrix()
		if (!this.owned){
			let minDist = Infinity;
			let closest = null;
			const allItems = [...this.game.weapons, ...this.game.items].filter(item => !item.owned && !item.inInventory)
			allItems.forEach(item => {
				const distance = Funcs.dist(item, this.game.player);
				if (distance <= minDist){
					minDist = distance
					closest = item;
				}
			});
			if (Funcs.dist(this, this.game.player) <= 120){ 
				if (!this.inInventory && closest === this && !this.game.player.inventoryFull){
					fill(0)
					ctx.fillStyle = 'black'
					Display.text("Press E to pick up", this.x + 60, this.y - 30, 24, { format: 'italic bold', align: 'center' })
					if (keys.click("interact") && !this.game.player.inventoryFull){
						this.owned = true;
						this.owner = this.game.player;
						this.game.player.weapons.push(this)
					}
				} else if (closest === this && this.game.player.inventoryFull){
					ctx.fillStyle = 'black'
					Display.text("Inventory Full", this.x + 60, this.y - 30, 24, { format: 'italic bold', align: 'center' })
				}
			}
		}
	}
	update(){
		if (this.owned){
			this.x = this.owner.x;
			this.y = this.owner.y;
			if (this.timer <= 0 || !['sword', 'axe'].includes(this.type)) this.angle = this.owner.angle
			if (this.type === 'spear') this.angle = this.owner.angle - Funcs.degToRad(10);
			if (this.timer <= 0 || this.type !== 'spear') this.offset = { x: 102, y: 36 };
			if (this.timer <= 0){
				
				this.hit = false;
			}
			this.target = this.owner.target;
			if (this.owner.dead){
				this.owned = false;
				this.owner = null;
				this.target = null;
			}
			
			if (this.owned){
				if (this.durability <= 0){
					if (this.owner === this.game.player){
						this.game.player.weapons.forEach((weapon, index) => {
							if (weapon === this){
								this.game.player.weapons.splice(index, 1)
								this.game.player.weapon = undefined;
							}
						})
					}
				}
			}
		}
		this.timer --;
		this.updateBody()
	}
	collide(body, type){
		if (type === 'start'){
			if (body.label === 'enemy'){
				if (!this.owned && body.object.targetWeapon === this){
					if (body.object.weapon === undefined) body.object.weapon = this;
					this.owned = true;
					this.owner = body.object;
				}
			} else {
				if (keys.click("interact")){
					this.game.player.weapon = this;
					this.owner = this.game.player;
					this.owned = true;
				}
			}
			
			
			const damage = this.damageMap[this.type][this.material]
			if (this.owned && !this.hit && this.timer > 0){
				if (this.owner.body.label === 'enemy'){
					if (body.object === this.target){
						this.target.takeDamage(damage, this.owner, 1);
						this.durability --;
						
						this.game.particles.push(new Particle({
							x: this.target.x, y: this.target.y,
							expand: 0.5, fade: true,
							img: imgs.particles.hit * (this.damage / 6),
							sz: 40,
							lifetime: 30,
							v: { y: 0, x: 0 },
						}))
						this.hit = true;
					}
				} else if (this.owner === this.game.player) {
					this.game.enemies.forEach(e => {
						if (body.object === e) {
							e.takeDamage(damage, this.game.player, 1)
							this.game.particles.push(new Particle({
								x: this.body.position.x, y: this.body.position.y,
								expand: 1, fade: true,
								img: imgs.particles.hit,
								sz: 40,
								lifetime: 30,
								v: { y: 0, x: 0 },
							}))
							this.hit = true;
							this.durability --;
						}
					})
					this.game.crates.forEach(c => {
						if (body.object === c){
							c.health -= damage;
							this.game.particles.push(new Particle({
								x: c.x, y: c.y,
								expand: 1, fade: true,
								img: imgs.particles.hit,
								sz: 40,
								lifetime: 30,
								v: { y: 0, x: 0 },
							}))
							this.hit = true;
						}
					})
				}
			}
		}
	}
	run(){
		this.display()
		this.update()
	}
}

			this.update()
			this.updatePos()
		}

	handleStats(){
		this.displayHealth = Funcs.lerp(this.displayHealth, this.health, 0.1);
		this.displayStamina = Funcs.lerp(this.displayStamina, this.stamina, 0.1);
		
		this.health += 0.02;
		
		this.stamina = constrain(this.stamina, 0, this.maxStamina)
		this.health = constrain(this.health, 0, this.maxHealth)
	}
	display(){
		pushMatrix();
		translate(this.x, this.y)
		rotate(Funcs.radToDeg(this.angle))
		
		pushStyle();
		strokeWeight(1)
		stroke(255, 0, 0)
		line(154, 0, 0, 0)
		
		
		popStyle();
		
		fill(0)
		ellipse(0, 0, this.r, this.r)
		
		popMatrix();
		
	}
	handleLocking(){
		let minDist = Infinity;
		this.game.enemies.forEach(e => {
			const distance = Funcs.dist(this, e)
			if (distance < minDist) {
				minDist = distance;
				this.closest = e;
			}
		})
		if (this.closest){
			const locked = this.target===this.closest
			pushMatrix();
			translate(0, sin(frameCount * (locked ? 5 : 3)) * (locked ? 8 : 4) - 40)
			if (locked){
				fill(235, 143, 38)
				rect(this.closest.x - 7, this.closest.y - 150, 13, 30)
			} else {
				fill(255)
			}
			triangle(this.closest.x - 20, this.closest.y - 120, this.closest.x, this.closest.y - 100, this.closest.x + 20, this.closest.y - 120)
			popMatrix()
			
			if (this.closest.dead) this.target = mouse;
			if (keys.click('toggleLock')){
				if (this.target === this.closest && Funcs.dist(this, this.closest) <= 400){
					this.target = mouse;
				} else {
					this.target = this.closest;
				}
			}
		}
	}
	update(){
		this.handleLocking();
		if (this.target === this.closest){
			this.angle = Math.atan2(
				this.target.y - this.y,
				this.target.x - this.x
			)
		} else if (this.target === mouse) {
			this.angle = Math.atan2(
				(this.target.y - height/2) / (this.game.camera.zoom) + this.game.camera.y - this.y,
				(this.target.x - width/2) / (this.game.camera.zoom) + this.game.camera.x - this.x
			)
		}
		Body.setAngle(this.body, this.angle)
		
		if (keys.press("left")) {
			this.v.x = -this.speed;
		} else if (keys.press("right")) {
			this.v.x = this.speed;
		} else {
			this.v.x = Funcs.lerp(this.v.x, 0, 0.15)
		}
		
		if (keys.press("up")) {
			this.v.y = -this.speed;
		} else if (keys.press("down")) {
			this.v.y = this.speed;
		} else {
			this.v.y = Funcs.lerp(this.v.y, 0, 0.15)
		}
		
		if (keys.press("sprint") && this.stamina > 0){
			this.speed = this.maxSpeed + 2;
			this.stamina -= 0.2;
		} else {
			this.speed = this.maxSpeed
			this.stamina += 0.1;
		}
		this.move(this.v.x, this.v.y)
		this.updatePos();
		
		if (this.weapon){
			this.weapon.owned = true
			this.weapon.owner = this
			this.weapon.run()
		}
		
		this.handleStats()
	}
	run(){
		if (this.game.active) this.update();
		this.display();
		if (this.weapon) this.handleAttacks(this.weapon, mouse.released && this.weapon.timer <= 0)
	}
}

class Enemy extends Entity {
	constructor(game, config){
		super(game, config)
		
		Body.setMass(this.body, 10000)
		Body.set(this.body, { label: "enemy" })
		
		this.executable = 'run'
		this.game = game;
		
		// Position, sizing, and rotation
		this.x = config.x;
		this.y = config.y;
		this.r = config.r;
		this.angle = random(0, 360);
		
		// Velocity
		this.v = { x: 0, y: 0 };
		this.prevV = this.v; // Previous velocity for stumbling back
		this.speed = 3;
		
		// Range and player detection
		this.range = config.range;
		this.detected = false;
		this.target = null;
		
		// Weapon finding
		this.hasWeapon = false; // Bokoblins will get a weapon
		this.targetWeapon = null; // When a player is found, the bokoblin will run to this weapon
		this.target = null;
		this.attackTimer = 0;
		
		// Stunning (for knockback)
		this.stunTimer = 0;
	}
	takeDamage(amt, source, kb){
		this.health -= amt;
		if (source){
			if (source.angle){
				this.stunTimer = 10;
				Body.setVelocity(this.body, {
					x: Math.cos(source.angle) * (kb || 3),
					y: Math.sin(source.angle) * (kb || 3),
				});
			}
		}
	}
	handleDetection() {
	    const range = this.range;
	    const points = 25;
	    let startPos = {
	        x: this.x,
	        y: this.y,
	    };
	    for(let i = 0; i < points; i ++) {
	        const angle = Funcs.radToDeg(this.angle) - 45 + Funcs.radToDeg(2 * Math.PI * i / points);
	        const newRange = i > 7 ? 88 : range;
	        const x = newRange * cos(angle);
	        const y = newRange * sin(angle);
	        let endPos = {
	            x: this.x+x,
	            y: this.y+y
	        };
	        
	        // Collisions sorting by AI
	        // Sorts collisions so enemy view is blocked by objects
	        let collisions = Query.ray(
	            Composite.allBodies(engine.world),
	            startPos,
	            endPos
	        ).sort((a, b) => {
			    const da = Funcs.dist(startPos, a.body.position);
			    const db = Funcs.dist(startPos, b.body.position);
			    return da - db;
			});
	        strokeWeight(1)
	        stroke(0, 0, 255)
	        let inactive = false;
	        for (let c of collisions){
				if(c.body.object instanceof Crate || c.body.object instanceof Rock) {
					break;
				}
				if(c.body.object instanceof Player && !inactive && !this.noticed) {
					this.attackTimer = 600;
					this.noticed = true;
					if (this.camp) this.camp.alertTimer = 600;
					stroke(0, 255, 0)
					break;
				}
	        }
	        
	  		// line(this.x, this.y, this.x + x, this.y+y);
			// strokeWeight(6);
			// point(this.x + x, this.y + y)
	    }
	    noStroke();
	}
	collide(body, type){
		
	}
	run(){
		if (Funcs.onCanvas(this, this.game.camera)){
			this.updatePos()
			if (this.game.active) {
				this?.runAI();
				this.update();
				this.handleDetection();
			}
			this.display();
		}
	}
}

class Bokoblin extends Enemy {
	constructor(game, config){
		config.range = 296;
		super(game, config)
		
		// Bokoblin camp, if any
		this.camp = config.camp || null;
		
		// Original position
		this.origin = { x: config.x, y: config.y };
		
		// AI and attacking
		this.target = null;
		this.hasWeapon = false;
		this.targetWeapon = null;
		this.attackTimer = 0;
		this.attackDelay = 0;
		this.suspicion = 0;
		this.noticed = false;
		
		// Health
		this.health = 20;
	}
	runAI(){
		if (this.attackTimer > 0 && this.noticed){
			if (!this.hasWeapon && this.targetWeapon){
				this.target = this.targetWeapon;
			} else if (this.hasWeapon || !this.targetWeapon) {
				this.target = this.game.player;
			} else {
				this.target = this.origin;
			}
		} else {
			this.noticed = false;
		}
	}
	collide(body, type){
		if (type === 'start'){
			if (body.object === this.targetWeapon){
				this.hasWeapon = true;
				this.targetWeapon.owner = this;
				this.targetWeapon.owned = true;
				this.weapon = this.targetWeapon;
			}
		}
	}
	update(){
		if (this.target !== null && this.noticed){
			this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x)
			
			if (Funcs.dist(this, this.target) >= 160 || this.target !== this.game.player) {
				this.v.x = Math.cos(this.angle) * this.speed;
				this.v.y = Math.sin(this.angle) * this.speed;
			}
		}
		if (this.stunTimer <= 0) this.move(this.v.x, this.v.y)
		this.stunTimer --;
		if (this.camp){
			if (this.camp.alertTimer >= 500){
				this.attackTimer = 600;
				this.noticed = true;
			}
		}
		
		this.attackTimer --;
		
		if (this.hasWeapon){
			this.handleAttacks(this.weapon, this.weapon.timer <= 0 && Funcs.dist(this, this.game.player) <= 160 && this.attackTimer > 0)
		}
	}
	display(){
		imageMode(CENTER)
		pushMatrix()
		translate(this.x, this.y)
		rotate(Funcs.radToDeg(this.angle))
		
		// fill(255, 0, 0)
		// ellipse(0, 0, this.r, this.r)
		
		
		pushStyle();
		strokeWeight(1)
		stroke(255, 0, 0)
		line(432, 0, 0, 0)
		
		pushMatrix();
		rotate(-90)
		image(imgs.entities.bokoblin, 0, 0, imgs.entities.bokoblin.width * (70/imgs.entities.bokoblin.height), 70);
		popMatrix()
		
		popStyle();
		popMatrix()
		
		if (Funcs.dist(this, this.game.player) <= 260 || this.attackTimer > 0){
			fill(70)
			rect(this.x - 16, this.y - 100, 50, 8)
			fill(255, 0, 0)
			rect(this.x - 16, this.y - 100, map(this.health, 0, 20, 0, 50), 8)
		}
	}
}

class GuardianLeg {
	static maxLength = 500;
	constructor(config){
		this.points = this.origin = config.points;
		this.stepSize = 300;
		this.angle = config.angle;
	}
	display(){
		// ChatGPT:
		// - Guided me on how to use the quadraticCurveTo function to make the leg
		// - How to bend the leg based on how close the points were
		// Stackoverflow
		// Provided quadratic Bezier formula to place segments properly on the leg
		
		const x1 = this.points[0][0],  y1 = this.points[1][0];
		const x2 = this.points[0][1], y2 = this.points[1][1];
		
		const dx = x2 - x1, dy = y2 - y1, distance = Math.sqrt(Math.pow(dx, 2) + Math.pow(dy, 2))
		const mx = (x1 + x2) / 2;
		const my = (y1 + y2) / 2;
		const bend = Math.max(0, 1 - distance / GuardianLeg.maxLength)
		
		const nx = -dy / distance, ny = dx / distance;
		
		const bendStrength = 180;
		const cx = mx + nx * bend * bendStrength;
		const cy = my + ny * bend * bendStrength;
		
		ctx.strokeStyle = 'rgb(240, 240, 240)'
		ctx.lineWidth = 12;
		
		ctx.beginPath();
		ctx.moveTo(x1, y1);
		ctx.quadraticCurveTo(cx, cy, x2, y2);
		ctx.stroke();
		
		const points = 11;
		for (let i = 0; i < points; i ++){
			const t = i / points;
			const px = Math.pow(1 - t, 2) * x1 + 2 * (1 - t) * t * cx + Math.pow(t, 2) * x2;
			const py = Math.pow(1 - t, 2) * y1 + 2 * (1 - t) * t * cy + Math.pow(t, 2) * y2;
			
			const dx = 2 * (1 - t) * (cx - x1) + 2 * t * (x2 - cx);
			const dy = 2 * (1 - t) * (cy - y1) + 2 * t * (y2 - cy);
			const angle = atan2(dy, dx)
			
			pushMatrix();
			
			translate(px, py)
			rotate(angle+-38)
			
			fill(171, 171, 171)
			
			beginShape();
			vertex(10, 10)
			vertex(-10, 10)
			vertex(5, 2)
			vertex(10, -10)
			endShape();
			
			popMatrix();
		}
	}
}

class Camera {
	constructor(game, config){
		this.game = game;
		
		// Positioning
		this.x = config.target.x || 0;
		this.y = config.target.y || 0;
		
		// Camera's target/focus
		this.target = config.target;
		
		// How fast camera finds player (for smooth mode)
		this.speed = config.speed; 
		
		// Handle default zoom and zoom constraints
		this.zoom = 0.4;
		this.maxZoom = config.zoomLimits.max;
		this.minZoom = config.zoomLimits.min;
		
		// Follow mode (instant/smooth)
		this.mode = 'smooth'
	}
	start(){
		pushMatrix();
		translate(width / 2, height / 2)
		scale(this.zoom)
		translate(-this.x, -this.y)
	}
	end(){
		popMatrix()
	}
	handleZoom(){
		if (keys.press("zoomIn")){
			this.zoom += 0.01;
		} else if (keys.press("zoomOut")){
			this.zoom -= 0.01;
		}
		this.zoom = constrain(this.zoom, this.minZoom, this.maxZoom)
	}
	follow(){
		const targetX = this.target.x;
		const targetY = this.target.y;
		
		switch (this.mode){
			case 'smooth':
				this.x = lerp(this.x, targetX, this.speed)
				this.y = lerp(this.y, targetY, this.speed)
			break;
			case 'instant':
				this.x = targetX, this.y = targetY;
			break;
		}
	}
	run(){
		this.follow()
		this.handleZoom()
	}
}

			ctx.filter = 'none'
			
			if (keys.click('inventory')) g.inInventory = !g.inInventory;
			if (g.inInventory) g.UI.inventory();
			// g.UI.inventory()
			
			
			g.UI.hud()
		},
		'tutorial': function(){},
		'win': function(){},
	};
	return _Scenes;
})();

class Game {
	/**
	
	* @constructor
	* Bundle and execute main game functions
	
	**/
	constructor(config){
		// Scene control
		this.scene = config.scene;
		this.sceneTo = config.sceneTo;
		
		// Debug/developer configuration
		this.debug = config.debug;
		
		// Objects
		this.player = new Player(this, { x: 0, y: 0, })
		this.camera = new Camera(this, { target: this.player, speed: 0.5, zoomLimits: { min: 0.3, max: 1, }})
		
		// UI overlays for gameplay
		this.inventorySection = 0;
		this.inventorySelect = 0;
		this.inInventory = false;
		this.UI = {
			'hud': () => {
				// Health
				const len = round(this.player.displayHealth * 2.2);
				
				ctx.beginPath()
				ctx.save()
				const gradient = ctx.createLinearGradient(20, 20, 20 + len, 30)
				
				gradient.addColorStop(0, "rgb(255, 43, 5)")
				gradient.addColorStop(1, "rgb(166, 0, 0)")
				
				ctx.fillStyle = gradient;
				ctx.roundRect(20, 20, len, 30, 5)
				ctx.fill()
				ctx.restore()
				ctx.closePath()
				
				ctx.save()
				
				tint(225, 100, 100, 255)
				image(imgs.UI.heart, 277, 35)
				noTint()
				
				// Stamina
				const len2 = round(this.player.displayStamina * 2.2);
				const gradient2 = ctx.createLinearGradient(20, 60, 20 + len2, 30)
				
				gradient2.addColorStop(0, "rgb(5, 255, 51)")
				gradient2.addColorStop(1, "rgb(0, 166, 14)")
				
				ctx.beginPath()
				ctx.fillStyle = gradient2;
				ctx.roundRect(20, 60, len2, 30, 5)
				ctx.fill()
				ctx.restore()
				ctx.closePath()
				
				
				image(imgs.UI.stamina, 277, 76, 20, 30)
				
				
				// Temperature
				const len3 = 220;
				const gradient3 = ctx.createLinearGradient(669, 20, 669 + len3, 20)
				
				gradient3.addColorStop(0, "rgb(94, 175, 255)")
				gradient3.addColorStop(1, "rgb(166, 72, 0)")
				
				ctx.beginPath()
				ctx.fillStyle = gradient3;
				ctx.roundRect(669, 20, len3, 30, 5)
				ctx.fill()
				ctx.restore()
				ctx.closePath()
				
				fill(255)
				rectMode(CORNER)
				rect(775 + map(this.dome.temperature - 25, -100, 100, -110, 110), 20, 7, 30)
				
				ctx.fillStyle = 'black'
				Display.text(`${String(this.dome.temperature)}°C`, 656, 41, 20, {format: "bold", title: true, align: 'right'})
				
				// Dome Event Indictator
				const len4 = window.innerWidth - 200;
				const gradient4 = ctx.createLinearGradient((width / 2) - len4 / 2, 527, len4, 28)
				
				gradient4.addColorStop(0, "rgb(255, 255, 255)")
				gradient4.addColorStop(0.25, "rgb(0, 166, 19)")
				gradient4.addColorStop(0.5, "rgb(112, 207, 255)")
				gradient4.addColorStop(0.75, "rgb(255, 119, 112)")
				
				ctx.beginPath()
				ctx.fillStyle = gradient4;
				ctx.roundRect((width / 2) - len4 / 2, 527, len4, 30, 28)
				ctx.fill()
				ctx.restore()
				ctx.closePath()
			},
			'inventory': () => {
				fill(0, 180)
				rectMode(CORNER)
				rect(0, 0, width, height)
				
				pushStyle();
				stroke(120)
				strokeWeight(1)
				line(0, 120, width, 120)
				popStyle();
				
				ctx.fillStyle = 'white'
				Display.text('Inventory', width / 2, 71, 30, { format: 'italic 500', letterSpacing: 3, })
				
				stroke(120, 180)
				fill(0, 90)
				rect(521, 329, 415, 190)
				
				line(547, 393, 892, 393)
				
				
				const gap = 80;
				for (let i = 0; i < 6; i ++){
					for (let j = 0; j < 4; j ++){
						pushMatrix()
						translate(20, 224)
						fill(0)
						rect(i * gap, j * gap, 55, 55)
						popMatrix()
					}
				}
				
				let offsetX = 0;
				let offsetY = 0;
				let totalCount = 0;
				let allItems = [...this.player.weapons, ...this.player.items]
				let curItem = allItems[this.inventorySelect];
				let typeStack = [];
				for (let i = 0; i < 24; i ++){
					if (i <= allItems.length){
						if (this.player.weapon === this.player.weapons[i]){
							pushMatrix()
							translate(20, 224)
							fill(5, 142, 244)
							rect(offsetX, offsetY, 55, 55)
							popMatrix()
						}
					}
					// Selected item outline
					if (this.inventorySelect === i){
						noFill();
						strokeWeight(1)
						stroke(255)
						pushMatrix()
						translate(20, 224)
						rect(offsetX, offsetY, 55, 55)
						noStroke();
						
						translate(3, 3)
						fill(255)
						triangle(offsetX - 4, offsetY - 4, offsetX + 4, offsetY - 4, offsetX - 4, offsetY + 4)
						
						translate(3, 0)
						triangle(offsetX + 55 - 4, offsetY - 4, offsetX + 55 - 12, offsetY - 4, offsetX + 55 - 4, offsetY + 4)
						
						translate(-3, 3)
						triangle(offsetX - 4, offsetY + 55 - 4, offsetX + 4, offsetY + 55 - 4, offsetX - 4, offsetY + 55 - 12)
						translate(3, 0)
						triangle(offsetX + 55 - 4, offsetY + 55 - 4, offsetX + 55 - 12, offsetY + 55 - 4, offsetX + 55 - 4, offsetY + 55 - 12)
						popMatrix()
						
					}
					const item = allItems[i];
					let sz = 0;
					
					// Item stacking logic
					if (item && !typeStack.includes(item.type)){
						let img = null;
						if (item instanceof Weapon){
							img = imgs.weapons[`${item.material}_${item.type}`]
							sz = 51;
						} else if (item instanceof Item){
							img = imgs.items[item.type]
							sz = 30;
							typeStack.push(item.type)
						} 
						pushMatrix()
						translate(48 + offsetX, 251 + offsetY)
						rotate(item instanceof Weapon ? -45 : 0)
						imageMode(CENTER)
						image(img, 0, 0, sz, img.height * (sz/img.width));
						popMatrix()
						totalCount ++;
					} else if (item && typeStack.includes(item.type)){
						const target = item.type;
						const stackItem = allItems.find(i => i === target)
						const count = allItems.filter(i => i.type === item.type).length;
						typeStack.push(item.type)
						
						ctx.fillStyle = 'white'
						Display.text(`${String(count)}`, offsetX, 280 + offsetY, 16)
					}
					offsetX += gap
					if ((i + 1) % 6 === 0){
						offsetX = 0;
						offsetY += gap;
					}
					// Inventory gap
					if (totalCount >= 24){
						this.player.inventoryFull = true;
					}
				}
				
				// Prevent stacked items from showing info in following slots
				let first = true;
				if (allItems[this.inventorySelect] instanceof Item) first = allItems.findIndex(item => item && item.type === curItem.type) === this.inventorySelect;
				
				// Selected item info
				if (allItems[this.inventorySelect] !== undefined && (!typeStack.includes(curItem.type) || first)) {
					const type = curItem.type;
					const material = curItem instanceof Weapon ? curItem.material : '';
					ctx.fillStyle = 'white'
					Display.text(`${curItem instanceof Weapon ? Display.capitalize(material) + ' ' : ''}${Display.capitalize(type)}`, 553, 377, 30, { format: 'italic 500', align: 'left' })
					
					if (curItem instanceof Weapon){
						Display.text(`- ${String(curItem.damageMap[curItem.type][curItem.material])} attack damage\n- ${String(curItem.durabilityMap[curItem.type][curItem.material])} durability`, 554, 423, 14, { format: 'italic 500', align: 'left' })
					}
				}
				noStroke()
				
				// Inventory controls
				if (keys.click("enter") && this.player.weapons[this.inventorySelect] !== undefined) this.player.weapon = this.player.weapons[this.inventorySelect];
				this.inventorySelect = constrain(this.inventorySelect, 0, 23)
				if (keys.click("right")) this.inventorySelect ++;
				if (keys.click("left")) this.inventorySelect --;
				if (keys.click("up")) this.inventorySelect -= 6;
				if (keys.click("down")) this.inventorySelect += 6;
			},
			'minimap': function(){},
			'map': function(){},
			'dead': function(){},
		};
		
		// Image loading
		this.curLoad = 0;
		this.loading = true;
		this.imgLen = 0;
		Object.keys(imgs).forEach(category => {
			Object.keys(imgs[category]).forEach(img => {
				this.imgLen ++;
			});
		});
		
		// Game objects (enemies, rocks, etc)
		this.enemies = [
			new Guardian(this, {
				x: -317,
				y: -232,
			}),
		];
		this.particles = [];
		this.rocks = [];
		this.logs = [];
		this.campfires = [];
		this.weapons = []
		this.items = [];
		this.crates = [];
		this.camps = Array.from({ length: 50, }, () => new Camp(this, { x: cos(random(0, 360)) * random(0, 30000), y: sin(random(0, 360)) * random(0, 30000) }));
		this.objs = [this.enemies, this.rocks, this.logs, this.campfires, this.crates, this.weapons, this.camps, this.items, this.particles]
		
		// Handle physics
		this.handlePhysics()
		
		// Game state
		this.active = true;
		
		this.dome = new Dome(this)
	}
	loadImgs(){
		Object.keys(imgs).forEach(category => {
			Object.keys(imgs[category]).forEach(key => {
				imgs[category][key] = imgs[category][key]()
				this.curLoad ++;
			});
		});
		
		if (this.curLoad >= this.imgLen) {
			this.loading = false;
		}
        
       	background(0)
        pushStyle();
            noFill();
            strokeWeight(10);
            strokeCap(SQUARE);
            stroke(255);
            arc(width / 2, height / 2, 300, 300, 0, this.curLoad * 100);
        popStyle();
        
        fill(255);
        textFont(createFont("sans-serif"), 49);
        textAlign(CENTER, CENTER);
        text("Loading...", width / 2, 100);
	}
	runObjs(){
		this.objs.forEach(arr => {
			arr.forEach((obj, index) => {
				if (obj.health <= 0) obj.dead = true;
				obj[obj.executable]();
				if (obj.dead){
					if (obj.body) Composite.remove(engine.world, obj.body)
					arr.splice(index, 1)
				}
			});
		});
	}
	handlePhysics(){
		
		// Call `collide` functions for bodies based on collision state
		Events.on(engine, 'collisionStart', (e) => {
			let pairs = e.pairs;
			
			for (let pair of pairs){
				let { bodyA, bodyB } = pair;
				
				const objA = bodyA.object || bodyA.parent?.object;
				const objB = bodyB.object || bodyB.parent?.object;
				
				if (objA && objA?.collide !== undefined){
					objA.collide(bodyB, 'start')
				}
				if (objB && objB?.collide !== undefined){
					objB.collide(bodyA, 'start')
				}
			}
		})
		Events.on(engine, 'collisionActive', (e) => {
			let pairs = e.pairs;
			
			for (let pair of pairs){
				let { bodyA, bodyB } = pair;
				
				const objA = bodyA.object || bodyA.parent?.object;
				const objB = bodyB.object || bodyB.parent?.object;
				
				if (objA && objA?.collide !== undefined){
					objA.collide(bodyB, 'active')
				}
				if (objB && objB?.collide !== undefined){
					objB.collide(bodyA, 'active')
				}
			}
		})
		Events.on(engine, 'collisionEnd', (e) => {
			let pairs = e.pairs;
			
			for (let pair of pairs){
				let { bodyA, bodyB } = pair;
				
				const objA = bodyA.object || bodyA.parent?.object;
				const objB = bodyB.object || bodyB.parent?.object;
				
				if (objA && objA?.collide !== undefined){
					objA.collide(bodyB, 'end')
				}
				if (objB && objB?.collide !== undefined){
					objB.collide(bodyA, 'end')
				}
			}
		})
	}
	run(){
		if (this.active) Engine.update(engine, 1000/60)
		if (this.loading){
			this.loadImgs();
		} else {
			Scenes[this.scene](this);
		}
		this.active = !this.inInventory;
		mouse.update();
		keys.update();
	}
}

const game = new Game({
	scene: "game",
	debug: {
		hitboxes: true,
		event: "none",
		speed: [true, 12],
	},
})

draw = function(){
	game.run();
};
 	
}
